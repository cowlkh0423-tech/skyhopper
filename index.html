<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sky Hopper</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="game">


    <!-- UI -->

    <div id="ui">


        <div>
            SCORE :
            <span id="score">0</span>
        </div>


        <div>
            BEST :
            <span id="best">0</span>
        </div>


        <div>
            LEVEL :
            <span id="level">1</span>
        </div>


    </div>





    <!-- 바람 경고 -->


    <div id="windWarning">

        HEAD WIND

    </div>







    <!-- 새 -->


    <div id="bird">


        <div id="body"></div>


        <div id="eye"></div>


        <div id="shine"></div>


        <div id="beak"></div>


        <div id="wing"></div>


    </div>







    <!-- 장애물은 JS에서 생성 -->







    <!-- 시작 화면 -->


    <div id="startScreen">


        <h1>
            SKY HOPPER
        </h1>


        <p>
            CLICK / SPACE TO FLY
        </p>


        <button id="startButton">

            START

        </button>


    </div>






    <!-- 게임 종료 -->


    <div id="gameOverScreen">


        <h1>
            GAME OVER
        </h1>


        <p>

            SCORE :
            <span id="finalScore">
                0
            </span>

        </p>


        <button id="restartButton">

            RESTART

        </button>


    </div>



</div>





<script src="game.js"></script>


</body>

</html>
