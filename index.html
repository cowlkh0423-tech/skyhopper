<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sky Hopper</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="game">


    <!-- 점수 -->

    <div id="ui">

        <div>
            SCORE :
            <span id="score">0</span>
        </div>

        <div>
            BEST :
            <span id="best">0</span>
        </div>

    </div>



    <!-- 새 캐릭터 -->

    <div id="bird">

        <div id="wing"></div>

        <div id="eye"></div>

        <div id="beak"></div>

    </div>



    <!-- 시작 화면 -->

    <div id="startScreen">

        <h1>
            SKY HOPPER
        </h1>

        <p>
            터치 또는 SPACE로 날아오르기
        </p>


        <button id="startBtn">
            START
        </button>

    </div>



    <!-- 게임 종료 -->

    <div id="overScreen">


        <h1>
            GAME OVER
        </h1>


        <p>
            SCORE :
            <span id="result">
            0
            </span>
        </p>


        <button id="restartBtn">
            RESTART
        </button>


    </div>



</div>



<script src="game.js"></script>


</body>

</html>
