<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sky Hopper</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="gameContainer">


    <!-- 점수 -->

    <div id="scoreBox">

        SCORE :
        <span id="score">0</span>

    </div>


    <div id="bestBox">

        BEST :
        <span id="best">0</span>

    </div>




    <!-- 새 캐릭터 -->

    <div id="bird">


        <div id="birdBody"></div>

        <div id="eye"></div>

        <div id="beak"></div>

        <div id="wing"></div>


    </div>





    <!-- 장애물 생성 영역 -->






    <!-- 시작 화면 -->


    <div id="startScreen">


        <h1>
            SKY HOPPER
        </h1>


        <p>
            SPACE 또는 클릭으로 점프
        </p>


        <button id="startButton">
            START
        </button>


    </div>






    <!-- 게임 종료 -->


    <div id="gameOverScreen">


        <h1>
            GAME OVER
        </h1>


        <p>

            SCORE :
            <span id="finalScore">
                0
            </span>

        </p>



        <button id="restartButton">

            RESTART

        </button>


    </div>




</div>




<script src="game.js"></script>


</body>

</html>
